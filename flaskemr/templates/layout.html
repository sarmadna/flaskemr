<!DOCTYPE html>
<html lang="en" class="bg-light">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/static/logo.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="/static/styles.css" rel="stylesheet">
    <title>EMR | {{ title }}</title>
</head>
<body>
    <!-- left pane -->
    <div class="left">
        <div class="container-fluid h-100 p-4 d-print-none">
            <div class="d-flex flex-column h-25 align-items-center">
                <a href="/"><img src="/static/logo.svg" alt="Logo"></a>
            </div>
            <div class="d-flex flex-column h-50 justify-content-center align-items-center">
                <div class="btn-group-vertical">
                    <a href="{{ url_for('home' )}}" class="btn btn-outline-light {% if title == 'Dashboard' %} active {% endif %}" style="width: 200px;">Dashboard</a>
                    <a href="{{ url_for('clients_list') }}" class="btn btn-outline-light {% if title == 'Clients' %} active {% endif %}" style="width: 200px;">List Clients</a>
                    <a href="{{ url_for('clients_add') }}" class="btn btn-outline-light {% if title == 'Add Clients' %} active {% endif %}" style="width: 200px;">Add Clients</a>
                </div>
            </div>
            <div class="d-flex flex-column-reverse h-25 align-items-center text-light">
                <div>0750 0000 000</div>
                <div>Street Address</div>
                <div>Aesthetic Clinic</div>
                <div>@instaaccount</div>
            </div>
        </div>
    </div>
    <div class="main">
        <!-- top bar -->
        <div class="d-flex flex-column bg-light shadow py-2 px-4 mb-4 sticky-top">
            <div class="d-flex flex-row align-content-center justify-content-center">
                <div class="d-flex flex-column justify-content-center w-50">
                    <div class="fs-3">{{ title }}</div>
                </div>
                <div class="d-flex flex-column justify-content-center w-50">

                    <!-- login stuff goes here -->
                
                </div>
            </div>
        </div>
        <!-- contents goes here -->
        {% block content %}{% endblock content %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script>
        const params = new URLSearchParams(window.location.search);

        if (params.get("search") === "1") {
            const input = document.getElementById("fnm");
            if (input) {
                input.focus();
            }
        }
    </script>
</body>
</html>

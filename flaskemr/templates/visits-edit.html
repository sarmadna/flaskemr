{% extends "layout.html" %}
{% block content %}
<!-- div for white card -->
<div class="d-flex flex-column bg-white rounded-2 shadow p-2 mx-4 my-2 border-bottom border-1 border-secondary">
    <form action="{{ url_for('visits_edit', pid=visit.client.pid, vid=visit.vid) }}" method="POST">
    <div class="d-flex flex-row">
        <!-- left side of card -->
        <div class="d-flex flex-column w-50">
            <div class="input-group p-2">
                <label class="input-group-text" style="width: 150px;">Visit ID</label>
                <input type="text" class="form-control" value="{{ visit.display_vid }}" readonly>
            </div>
            <div class="input-group p-2">
                <label for="dat" class="input-group-text" style="width: 150px;">Date</label>
                <input type="date" name="dat" id="dat" class="form-control" value="{{ visit.dat.strftime('%Y-%m-%d') }}" required>
            </div>
            <div class="input-group p-2">
                <label for="ccc" class="input-group-text" style="width: 150px;">Complaint</label>
                <input type="text" name="ccc" id="ccc" class="form-control" value="{{ visit.ccc }}" required>
            </div>
            <div class="input-group p-2">
                <label for="dxx" class="input-group-text" style="width: 150px;">Diagnosis</label>
                <input type="text" name="dxx" id="dxx" class="form-control" value="{{ visit.dxx }}" required>
            </div>
        </div>
        <!-- right side of card -->
        <div class="d-flex flex-column w-50">
            <div class="input-group p-2">
                <label for="rx1" class="input-group-text" style="width: 150px;">Rx1</label>
                <input type="text" name="rx1" id="rx1" class="form-control" value="{{ visit.rx1 }}" required>
            </div>
            <div class="input-group p-2">
                <label for="rx2" class="input-group-text" style="width: 150px;">Rx2</label>
                <input type="text" name="rx2" id="rx2" class="form-control" value="{{ visit.rx2 }}">
            </div>
            <div class="input-group p-2">
                <label for="rx3" class="input-group-text" style="width: 150px;">Rx3</label>
                <input type="text" name="rx3" id="rx3" class="form-control" value="{{ visit.rx3 }}">
            </div>
            <div class="input-group p-2">
                <label for="rx4" class="input-group-text" style="width: 150px;">Rx4</label>
                <input type="text" name="rx4" id="rx4" class="form-control" value="{{ visit.rx4 }}">
            </div>
        </div>
    </div>
    <!-- submit button section -->
    <div class="d-flex flex-row justify-content-center align-items-center p-2">
        <div class="px-2"><a href="{{ url_for('visits_card', pid=visit.client.pid, vid=visit.vid) }}" class="btn btn-outline-primary" style="width: 150px;">Back</a></div>
        <div class="px-2"><button class="btn btn-outline-danger" style="width: 150px;">Update</button></div>
    </div>
    </form>
</div>
{% endblock content %}

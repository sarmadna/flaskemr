{% extends "layout.html" %}
{% block content %}
<div class="d-flex flex-column bg-white rounded-2 shadow p-2 mx-4 my-2 border-bottom border-1 border-secondary">
    <form action="{{ url_for('clients_add_form') }}" method="POST">
        <div class="d-flex flex-row">
            <div class="d-flex flex-column w-50">

                <div class="input-group p-2">
                    <label for="pid" class="input-group-text" style="width: 150px;">Client ID</label>
                    <input type="text" id="pid" name="pid" class="form-control" disabled>
                </div>

                <div class="input-group p-2">
                    <label for="fnm" class="input-group-text" style="width: 150px;">First name</label>
                    <input type="text" id="fnm" name="fnm" class="form-control" required>
                </div>

                <div class="input-group p-2">
                    <label for="mnm" class="input-group-text" style="width: 150px;">Middle name</label>
                    <input type="text" id="mnm" name="mnm" class="form-control" required>
                </div>

                <div class="input-group p-2">
                    <label for="lnm" class="input-group-text" style="width: 150px;">Last name</label>
                    <input type="text" id="lnm" name="lnm" class="form-control" required>
                </div>

            </div>

            <div class="d-flex flex-column w-50">

                <div class="input-group p-2">
                    <label for="sex" class="input-group-text" style="width: 150px;">Sex</label>
                    <select name="sex" id="sex" class="form-select" required>
                        <option value="" disabled selected hidden>Choose option...</option>
                        <option value="male">male</option>
                        <option value="female">female</option>
                    </select>
                </div>

                <div class="input-group p-2">
                    <label for="dob" class="input-group-text" style="width: 150px;">Date of birth</label>
                    <input type="text" id="dob" name="dob" class="form-control" placeholder="YYYY" pattern="[0-9]{4}" required>
                </div>

                <div class="input-group p-2">
                    <label for="adr" class="input-group-text" style="width: 150px;">Address</label>
                    <input type="text" id="adr" name="adr" class="form-control">
                </div>

                <div class="input-group p-2">
                    <label for="tel" class="input-group-text" style="width: 150px;">Phone</label>
                    <input type="text" id="tel" name="tel" class="form-control">
                </div>

            </div>
        </div>

        <div class="d-flex flex-row justify-content-center align-items-center p-2">
            <button type="submit" class="btn btn-outline-primary" style="width: 200px;">Save</button>
        </div>

    </form>
</div>
{% endblock content %}
